/**
 * ==========================================
 * 3. 核心逻辑处理
 * ==========================================
 */
function saveMistakes() {
    localStorage.setItem('apple_mistakes_set1', JSON.stringify(state.mistakes1));
    localStorage.setItem('apple_mistakes_set2', JSON.stringify(state.mistakes2));
}

function shuffleArray(array) {
    const newArr = [...array];
    for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }
    return newArr;
}

function goHome() {
    state.view = 'home';
    render();
}

function openMenu(setId) {
    state.activeSetId = setId;
    state.view = 'menu';
    render();
}

function startQuiz(mode) {
    const currentData = state.activeSetId === 1 ? DATA_SET_1 : DATA_SET_2;
    const currentMistakes = state.activeSetId === 1 ? state.mistakes1 : state.mistakes2;
    
    let filtered = currentData;
    if (state.quizCategory !== 'all') {
        filtered = filtered.filter(q => q.type === state.quizCategory);
    }

    if (mode === 'mistakes') {
        filtered = filtered.filter(q => currentMistakes.includes(q.id));
        if (filtered.length === 0) {
            alert("太棒了！当前分类下没有任何错题记录。");
            return;
        }
    } else if (mode === 'random') {
        filtered = shuffleArray(filtered);
    }

    state.quizMode = mode;
    state.quizQuestions = filtered;
    state.currentIndex = 0;
    state.selectedOptions = [];
    state.isSubmitted = false;
    state.isCorrect = false;
    state.view = 'quiz';
    render();
}

function handleOptionSelect(key) {
    if (state.isSubmitted) return;
    const q = state.quizQuestions[state.currentIndex];
    
    if (q.type === 'multiple') {
        if (state.selectedOptions.includes(key)) {
            state.selectedOptions = state.selectedOptions.filter(k => k !== key);
        } else {
            state.selectedOptions.push(key);
        }
        render(); // 多选题仅更新UI
    } else {
        // 单选/判断直接提交，提升刷题效率
        state.selectedOptions = [key];
        submitAnswer();
    }
}

function submitAnswer() {
    if (state.selectedOptions.length === 0) return;
    state.isSubmitted = true;
    
    const q = state.quizQuestions[state.currentIndex];
    const userAns = [...state.selectedOptions].sort().join('');
    const correctAns = q.ans.split('').sort().join('');
    
    state.isCorrect = (userAns === correctAns);
    
    const currentMistakes = state.activeSetId === 1 ? state.mistakes1 : state.mistakes2;

    if (!state.isCorrect) {
        if (!currentMistakes.includes(q.id)) {
            currentMistakes.push(q.id);
        }
    } else {
        // 答对且在错题模式下，将其移出错题本
        if (state.quizMode === 'mistakes' && currentMistakes.includes(q.id)) {
            const idx = currentMistakes.indexOf(q.id);
            currentMistakes.splice(idx, 1);
        }
    }
    saveMistakes();
    render();
}

function nextQuestion() {
    if (state.currentIndex < state.quizQuestions.length - 1) {
        state.currentIndex++;
        state.selectedOptions = [];
        state.isSubmitted = false;
        state.isCorrect = false;
        render();
        window.scrollTo(0,0);
    } else {
        alert("🎉 恭喜！您已完成本次所有题目。");
        state.view = 'menu';
        render();
    }
}

/**
 * ==========================================
 * 4. 视图渲染 (动态生成 HTML)
 * ==========================================
 */
function render() {
    const app = document.getElementById('app');
    
    if (state.view === 'home') {
        app.innerHTML = renderHome();
    } else if (state.view === 'menu') {
        app.innerHTML = renderMenu();
    } else if (state.view === 'quiz') {
        app.innerHTML = renderQuiz();
    }
}

                    <div class="apple-card overflow-hidden">
                        <button onclick="startQuiz('sequential')" class="btn-press w-full p-4 flex items-center gap-4 border-b border-gray-100 bg-white hover:bg-gray-50">
                            <div class="w-10 h-10 rounded-[12px] bg-blue-500 text-white flex items-center justify-center">
                                ${Icons.book}
                            </div>
                            <span class="text-[17px] font-medium text-gray-800">顺序刷题</span>
                        </button>
                        
                        <button onclick="startQuiz('random')" class="btn-press w-full p-4 flex items-center gap-4 border-b border-gray-100 bg-white hover:bg-gray-50">
                            <div class="w-10 h-10 rounded-[12px] bg-indigo-500 text-white flex items-center justify-center">
                                ${Icons.shuffle}
                            </div>
                            <span class="text-[17px] font-medium text-gray-800">随机打乱</span>
                        </button>
                        
                        <button onclick="startQuiz('mistakes')" class="btn-press w-full p-4 flex items-center justify-between bg-white hover:bg-gray-50">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-[12px] bg-red-500 text-white flex items-center justify-center">
                                    ${Icons.mistakeBook}
                                </div>
                                <span class="text-[17px] font-medium text-gray-800">复习错题本</span>
                            </div>
                            ${currentMistakes > 0 ? `<span class="bg-gray-100 text-gray-600 text-[13px] font-bold px-3 py-1 rounded-full">${currentMistakes} 题</span>` : ''}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `;
}

// ---- Quiz (刷题页) ----
function renderQuiz() {
    const q = state.quizQuestions[state.currentIndex];
    const isSet1 = state.activeSetId === 1;
    const themeColor = isSet1 ? 'blue' : 'green';
    const typeLabel = { single: '单选题', multiple: '多选题', tf: '判断题' }[q.type];
    
    // 计算丝滑进度条百分比
    const progress = ((state.currentIndex + 1) / state.quizQuestions.length) * 100;

    let optionsHtml = '';
    for (const [key, value] of Object.entries(q.options)) {
        const isSelected = state.selectedOptions.includes(key);
        const isCorrectAnswer = q.ans.includes(key);
        
        let btnClasses = "apple-card p-4 border-2 text-left flex items-start gap-3 transition-colors ";
        let iconHtml = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex-shrink-0 mt-[2px]"></div>`;

        if (!state.isSubmitted) {
            btnClasses += isSelected 
                ? `border-${themeColor}-500 bg-${themeColor}-50/40` 
                : `border-transparent hover:border-gray-200`;
            if(isSelected) {
                iconHtml = `<div class="w-6 h-6 rounded-full bg-${themeColor}-500 flex items-center justify-center flex-shrink-0 mt-[2px] text-white"><div class="w-2.5 h-2.5 bg-white rounded-full"></div></div>`;
            }
        } else {
            if (isCorrectAnswer) {
                btnClasses += "border-green-500 bg-green-50/50 ";
                iconHtml = `<div class="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center flex-shrink-0 mt-[2px] text-white">${Icons.check}</div>`;
            } else if (isSelected && !isCorrectAnswer) {
                btnClasses += "border-red-500 bg-red-50/50 ";
                iconHtml = `<div class="w-6 h-6 rounded-full bg-red-500 flex items-center justify-center flex-shrink-0 mt-[2px] text-white">${Icons.cross}</div>`;
            } else {
                btnClasses += "border-transparent opacity-50 grayscale ";
            }
        }

        optionsHtml += `
            <button onclick="handleOptionSelect('${key}')" class="btn-press w-full ${btnClasses}">
                ${iconHtml}
                <div class="flex-1">
                    <span class="font-bold text-[17px] mr-2 text-gray-900">${key}.</span>
                    <span class="text-gray-800 text-[16px] leading-relaxed">${value}</span>
                </div>
            </button>
        `;
    }

    return `
        <div class="fade-in flex flex-col min-h-screen bg-gray-50 pb-24">
            <!-- 顶部进度与返回 -->
            <div class="glass-nav sticky top-0 z-10">
                <div class="h-1 bg-gray-200 w-full overflow-hidden">
                    <div class="h-full bg-${themeColor}-500 transition-all duration-300 ease-out" style="width: ${progress}%"></div>
                </div>
                <div class="px-4 h-14 flex items-center justify-between">
                    <button onclick="state.view='menu'; render();" class="btn-press text-gray-500 flex items-center gap-1 font-medium -ml-2 p-2">
                        ${Icons.back} 结束
                    </button>
                    <div class="font-bold text-gray-800 text-[15px]">
                        ${state.currentIndex + 1} <span class="text-gray-400 font-normal mx-1">/</span> ${state.quizQuestions.length}
                    </div>
                    <div class="text-[11px] font-bold bg-gray-200/80 text-gray-600 px-2.5 py-1 rounded-md">
                        ${typeLabel}
                    </div>
                </div>
            </div>

            <!-- 题目区域 -->
            <div class="px-6 mt-6 mb-8">
                <h2 class="text-[19px] font-semibold text-gray-900 leading-snug tracking-tight">
                    ${q.q}
                </h2>
            </div>

            <!-- 选项区域 -->
            <div class="px-5 space-y-3">
                ${optionsHtml}
            </div>
            
            <!-- 底部交互区域 (多选确认 / 结果与下一题) -->
            <div class="px-5 mt-8">
                ${!state.isSubmitted && q.type === 'multiple' ? `
                    <button onclick="submitAnswer()" class="btn-press w-full py-4 rounded-[16px] text-[17px] font-bold text-white shadow-lg transition-all ${state.selectedOptions.length > 0 ? `bg-${themeColor}-500 shadow-${themeColor}-500/30` : 'bg-gray-300 pointer-events-none' }">
                        确定答案
                    </button>
                ` : ''}

                ${state.isSubmitted ? `
                    <div class="fade-in space-y-4">
                        ${q.explanation ? `
                            <div class="apple-card p-4 bg-blue-50/50 border border-blue-100 flex gap-3">
                                <div class="text-blue-500 flex-shrink-0 mt-[2px]">${Icons.bulb}</div>
                                <p class="text-[14px] text-blue-900 leading-relaxed font-medium">${q.explanation}</p>
                            </div>
                        ` : ''}
                        
                        <button onclick="nextQuestion()" class="btn-press w-full py-4 rounded-[16px] text-[17px] font-bold text-white bg-gray-900 shadow-xl shadow-gray-900/20 active:bg-gray-800">
                            ${state.currentIndex < state.quizQuestions.length - 1 ? '继续下一题' : '完成复习并返回'}
                        </button>
                    </div>
                ` : ''}
            </div>
        </div>
    `;
}

// ==========================================
// 初始化挂载
// ==========================================
window.onload = () => {
    render();
};

</script>
</body>
</html>
